# espresso-bridge configuration
# Copy to config.yaml and edit for your setup.

# ShotStopper settings
shotstopper:
  # BLE address (leave empty to auto-scan)
  address: ""
  # Default target weight (grams)
  default_weight: 36
  # Auto-reconnect on disconnect
  auto_reconnect: true
  # Reconnect interval (seconds)
  reconnect_interval: 5

# La Marzocco Linea Micra settings
# Credentials required for BLE control — see docs/lamarzocco-setup.md
lamarzocco:
  # BLE address (leave empty to auto-scan)
  address: ""
  # Machine serial number (printed on machine or from La Marzocco app)
  serial_number: ""
  # La Marzocco app account username (email)
  username: ""
  # BLE communication key (one-time extraction — see setup guide)
  communication_key: ""

# Web server settings
server:
  host: "0.0.0.0"
  port: 8080

# Wake/sleep schedule (biweekly rotation)
# Two week profiles (A/B) alternate automatically.
# reference_date anchors which week is A (even weeks from this date = A, odd = B).
schedule:
  enabled: false
  reference_date: ""  # ISO date of a known Week A Monday, e.g. "2025-01-06"
  week_a:
    monday:    { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
    tuesday:   { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
    wednesday: { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
    thursday:  { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
    friday:    { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
    saturday:  { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
    sunday:    { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
  week_b:
    monday:    { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
    tuesday:   { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
    wednesday: { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
    thursday:  { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
    friday:    { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
    saturday:  { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
    sunday:    { enabled: false, on_hour: 7, on_minute: 0, off_hour: 22, off_minute: 0, steam: true }
