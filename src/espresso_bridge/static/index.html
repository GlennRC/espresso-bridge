<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>espresso-bridge</title>
  <link rel="stylesheet" href="/css/app.css?v=10">
</head>
<body>
  <!-- Status Bar -->
  <header id="status-bar">
    <span class="status-item" id="ss-status">● ShotStopper</span>
    <span class="status-item" id="lm-status">● La Marzocco</span>
  </header>

  <!-- Views Container -->
  <div id="views">

    <!-- Brew View (default) -->
    <main id="brew-view" class="view active">
      <!-- Weight Control -->
      <section class="card weight-card">
        <h2>Target Weight</h2>
        <div class="weight-display">
          <button class="weight-btn" id="weight-down">−</button>
          <span class="weight-value" id="weight-value">36</span>
          <span class="weight-unit">g</span>
          <button class="weight-btn" id="weight-up">+</button>
        </div>
        <div class="weight-presets">
          <button class="preset-btn" data-weight="30">30g</button>
          <button class="preset-btn" data-weight="36">36g</button>
          <button class="preset-btn" data-weight="40">40g</button>
          <button class="preset-btn" data-weight="45">45g</button>
        </div>
        <div class="shot-indicator" id="shot-indicator">IDLE</div>
      </section>

      <!-- Machine Controls -->
      <section class="card machine-card">
        <h2>Linea Micra</h2>
        <div class="control-row">
          <label>Power</label>
          <button class="toggle-btn" id="lm-power">OFF</button>
        </div>
        <div class="control-row">
          <label>Coffee</label>
          <div class="temp-control">
            <button class="temp-btn" id="coffee-down">−</button>
            <span id="coffee-temp">93.0</span><span class="unit">°C</span>
            <button class="temp-btn" id="coffee-up">+</button>
          </div>
        </div>
        <div class="control-row">
          <label>Steam</label>
          <div class="steam-levels">
            <button class="level-btn" data-level="1">1</button>
            <button class="level-btn" data-level="2">2</button>
            <button class="level-btn" data-level="3">3</button>
          </div>
        </div>
      </section>
    </main>

    <!-- Schedule View -->
    <main id="schedule-view" class="view">
      <!-- Next Event Banner -->
      <div class="card schedule-banner" id="schedule-banner">
        <div class="banner-text" id="banner-text">No schedules</div>
      </div>

      <!-- Schedule List -->
      <div class="schedule-list" id="schedule-list">
        <!-- Populated by JS -->
      </div>

      <!-- Add Button -->
      <button class="add-schedule-btn" id="add-schedule-btn">+ New Schedule</button>

      <!-- Create/Edit Wizard (hidden by default) -->
      <div class="wizard" id="wizard" style="display:none;">
        <!-- Step 1: Time -->
        <div class="wizard-step" id="wiz-step-1">
          <div class="wiz-title">⏰ Wake Time</div>
          <div class="wheel-row">
            <div class="wheel-picker" id="wiz-hour">
              <div class="wheel-highlight"></div>
              <div class="wheel-scroller"></div>
            </div>
            <span class="wheel-sep">:</span>
            <div class="wheel-picker" id="wiz-minute">
              <div class="wheel-highlight"></div>
              <div class="wheel-scroller"></div>
            </div>
            <div class="wheel-picker wheel-picker-sm" id="wiz-ampm">
              <div class="wheel-highlight"></div>
              <div class="wheel-scroller"></div>
            </div>
          </div>
          <div class="wiz-row">
            <label>Steam</label>
            <button class="day-toggle on" id="wiz-steam"></button>
          </div>
          <div class="wiz-actions">
            <button class="wiz-btn cancel" id="wiz-cancel">Cancel</button>
            <button class="wiz-btn next" id="wiz-next-1">Next →</button>
          </div>
        </div>

        <!-- Step 2: Recurrence -->
        <div class="wizard-step" id="wiz-step-2" style="display:none;">
          <div class="wiz-title">📅 Recurrence</div>
          <div class="wheel-picker wheel-picker-lg" id="wiz-recurrence">
            <div class="wheel-highlight"></div>
            <div class="wheel-scroller"></div>
          </div>
          <div class="wiz-actions">
            <button class="wiz-btn back" id="wiz-back-2">← Back</button>
            <button class="wiz-btn next" id="wiz-next-2">Next →</button>
          </div>
        </div>

        <!-- Step 3: Days -->
        <div class="wizard-step" id="wiz-step-3" style="display:none;">
          <div class="wiz-title" id="wiz-days-title">📋 Select Days</div>
          <div id="wiz-days-content"></div>
          <div class="wiz-actions">
            <button class="wiz-btn back" id="wiz-back-3">← Back</button>
            <button class="wiz-btn save" id="wiz-save">Save ✓</button>
          </div>
        </div>
      </div>
    </main>

  </div>

  <!-- Bottom Tab Bar -->
  <nav id="tab-bar">
    <button class="tab active" data-view="brew-view">
      <span class="tab-icon">☕</span>
      <span class="tab-label">Brew</span>
    </button>
    <button class="tab" data-view="schedule-view">
      <span class="tab-icon">⏰</span>
      <span class="tab-label">Schedule</span>
    </button>
  </nav>

  <script src="/js/app.js?v=8"></script>
</body>
</html>
