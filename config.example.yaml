# espresso-bridge configuration
# Copy to config.yaml and edit for your setup.

# ShotStopper settings
shotstopper:
  # BLE address (leave empty to auto-scan)
  address: ""
  # Default target weight (grams)
  default_weight: 36
  # Auto-reconnect on disconnect
  auto_reconnect: true
  # Reconnect interval (seconds)
  reconnect_interval: 5

# La Marzocco Linea Micra settings
# Credentials required for BLE control — see docs/lamarzocco-setup.md
lamarzocco:
  # BLE address (leave empty to auto-scan)
  address: ""
  # Machine serial number (printed on machine or from La Marzocco app)
  serial_number: ""
  # La Marzocco app account username (email)
  username: ""
  # BLE communication key (one-time extraction — see setup guide)
  communication_key: ""

# Web server settings
server:
  host: "0.0.0.0"
  port: 8080
